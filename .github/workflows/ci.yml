name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      ppe-sha: ${{ steps.ppe.outputs.sha }}
    steps:
      - uses: actions/checkout@v6

      - name: Get PipePipeExtractor HEAD SHA
        id: ppe
        run: echo "sha=$(git ls-remote https://github.com/InfinityLoop1308/PipePipeExtractor.git HEAD | cut -f1)" >> "$GITHUB_OUTPUT"

      - uses: actions/cache@v5
        id: ppe-cache
        with:
          path: ~/.m2/repository/com/github/TeamNewPipe
          key: ppe-${{ steps.ppe.outputs.sha }}

      - uses: actions/setup-java@v5
        if: steps.ppe-cache.outputs.cache-hit != 'true'
        with:
          java-version: "17"
          distribution: temurin

      - name: Install PipePipeExtractor to Maven local
        if: steps.ppe-cache.outputs.cache-hit != 'true'
        working-directory: /tmp
        env:
          GRADLE_USER_HOME: /tmp/gradle-ppe
        run: |
          git clone --depth 1 https://github.com/InfinityLoop1308/PipePipeExtractor.git PipePipeExtractor
          cd PipePipeExtractor
          ./gradlew :extractor:publishToMavenLocal :timeago-parser:publishToMavenLocal

      - uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v6

      - name: Build
        run: ./gradlew build -x test

  test:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        group:
          - name: extraction
            tests: >-
              --tests dev.typetype.server.ExtractionTest
              --tests dev.typetype.server.StreamRoutesTest
              --tests dev.typetype.server.ProxyRoutesTest
              --tests dev.typetype.server.ManifestRoutesTest
              --tests dev.typetype.server.ManifestServiceTest
              --tests dev.typetype.server.HlsRewritingTest
              --tests dev.typetype.server.UrlStrippingTest
              --tests dev.typetype.server.UrlValidatorTest
              --tests dev.typetype.server.NativeManifestUtilsTest
              --tests dev.typetype.server.ExtractionResilienceTest
              --tests dev.typetype.server.StreamInfoMappersCoreTest
              --tests dev.typetype.server.NativeManifestBuilderCoreTest
              --tests dev.typetype.server.OkHttpDownloaderCoreTest
              --tests dev.typetype.server.StreamExtractionErrorMapperTest
          - name: routes-media
            tests: >-
              --tests dev.typetype.server.SearchRoutesTest
              --tests dev.typetype.server.TrendingRoutesTest
              --tests dev.typetype.server.CommentRoutesTest
              --tests dev.typetype.server.ChannelRoutesTest
              --tests dev.typetype.server.SuggestionRoutesTest
          - name: routes-user
            tests: >-
              --tests dev.typetype.server.SearchHistoryRoutesTest
              --tests dev.typetype.server.ProgressRoutesTest
              --tests dev.typetype.server.HistoryRoutesTest
              --tests dev.typetype.server.FavoritesRoutesTest
              --tests dev.typetype.server.WatchLaterRoutesTest
              --tests dev.typetype.server.SubscriptionsRoutesTest
              --tests dev.typetype.server.SettingsRoutesTest
              --tests dev.typetype.server.BlockedRoutesTest
              --tests dev.typetype.server.PlaylistRoutesTest
              --tests dev.typetype.server.PlaylistServiceTest
              --tests dev.typetype.server.SubscriptionFeedRoutesTest
              --tests dev.typetype.server.SubscriptionShortsFeedRoutesTest
              --tests dev.typetype.server.AuthServiceCoreTest
              --tests dev.typetype.server.PasswordResetServiceCoreTest
              --tests dev.typetype.server.YoutubeTakeoutIssueServiceTest
              --tests dev.typetype.server.ManifestRoutesTest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/cache@v5
        with:
          path: ~/.m2/repository/com/github/TeamNewPipe
          key: ppe-${{ needs.build.outputs.ppe-sha }}

      - uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: temurin

      - uses: gradle/actions/setup-gradle@v6

      - name: Test (${{ matrix.group.name }})
        run: ./gradlew test ${{ matrix.group.tests }}
